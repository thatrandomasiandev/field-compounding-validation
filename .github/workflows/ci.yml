name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        env:
          FIELD_COMPOUNDING_DEVICE: cpu
        run: pytest -q
